<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS System</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS Library -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <!-- Login Form Container -->
  <div id="login-card" class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">POS Login</h2>
    
    <form onsubmit="handleLogin(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Email</label>
        <input type="email" id="email" required placeholder="name@example.com"
               class="mt-1 w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700">Password</label>
        <input type="password" id="password" required placeholder="••••••••"
               class="mt-1 w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>
      
      <button type="submit" id="login-btn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition duration-200">
        Login
      </button>
    </form>

    <!-- Status / Error Messages -->
    <div id="message" class="mt-4 text-center text-sm font-medium hidden"></div>
  </div>

  <!-- Dashboard View (Hidden by default) -->
  <div id="dashboard" class="hidden p-8 bg-white rounded-xl shadow-md text-center">
    <h1 class="text-3xl font-bold text-green-600 mb-2">Welcome! 🎉</h1>
    <p class="text-gray-600 mb-4">Successfully logged into POS System.</p>
    <button onclick="handleLogout()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg">
      Logout
    </button>
  </div>

  <!-- JavaScript Code -->
  <script>
    // 1. Supabase Credentials (Quotes ඇතුළේ නිවැරදිව තබා ඇත)
    const SUPABASE_URL = "https://vpkwgxrabixokeqppduh.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwa3dneHJhYml4b2tlcXBwZHVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NDAyMzUsImV4cCI6MjEwMDIxNjIzNX0.QA9_iwMeVgWFlx8Np-o1pzSATDKj1JHBmf7FnuzEwBw"; // 👈 මෙතනට ඔයාගේ anon public key එක දාන්න

    // 2. Initialize Supabase Client
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 3. Login Handler Function
    async function handleLogin(event) {
      event.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const messageDiv = document.getElementById('message');
      const loginBtn = document.getElementById('login-btn');

      messageDiv.classList.add('hidden');
      loginBtn.disabled = true;
      loginBtn.innerText = "Connecting...";

      try {
        const { data, error } = await supabaseClient.auth.signInWithPassword({
          email: email,
          password: password,
        });

        if (error) throw error;

        // Login Successful
        showMessage("Login successful!", "text-green-600");
        document.getElementById('login-card').classList.add('hidden');
        document.getElementById('dashboard').classList.remove('hidden');

      } catch (error) {
        // Login Failed
        showMessage(error.message || "Login failed. Please check credentials.", "text-red-600");
      } finally {
        loginBtn.disabled = false;
        loginBtn.innerText = "Login";
      }
    }

    // Logout Handler
    async function handleLogout() {
      await supabaseClient.auth.signOut();
      document.getElementById('dashboard').classList.add('hidden');
      document.getElementById('login-card').classList.remove('hidden');
      showMessage("Logged out successfully", "text-gray-600");
    }

    // Helper to display messages
    function showMessage(text, colorClass) {
      const messageDiv = document.getElementById('message');
      messageDiv.innerText = text;
      messageDiv.className = `mt-4 text-center text-sm font-medium ${colorClass}`;
      messageDiv.classList.remove('hidden');
    }
  </script>

</body>
</html>
