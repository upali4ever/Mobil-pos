<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS System - Supabase Integration</title>
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Supabase JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen p-6 flex flex-col items-center">

  <div class="max-w-md w-full bg-white p-6 rounded-xl shadow-md">
    <h2 class="text-2xl font-bold mb-4 text-gray-800 text-center">Add Product to Database</h2>

    <!-- Product Form -->
    <form id="productForm" onsubmit="addProduct(event)" class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Product Name</label>
        <input type="text" id="p_name" required placeholder="Item Name"
               class="mt-1 w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Price (LKR)</label>
        <input type="number" id="p_price" required placeholder="100.00" step="0.01"
               class="mt-1 w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700">Quantity</label>
        <input type="number" id="p_qty" required placeholder="10"
               class="mt-1 w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
      </div>

      <button type="submit" id="save-btn"
              class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 rounded-lg transition duration-200">
        Save to Database
      </button>
    </form>

    <!-- Alert / Message Output -->
    <div id="statusMsg" class="mt-4 text-center font-medium text-sm hidden"></div>
  </div>

  <script>
    // 1. Supabase Setup
    const SUPABASE_URL = "https://vpkwgxrabixokeqppduh.supabase.co";
    // ⚠️ පහත දැක්වෙන තැනට ඔයාගේ Supabase Project Settings -> API එකේ ඇති anon public key එක paste කරන්න
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwa3dneHJhYml4b2tlcXBwZHVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NDAyMzUsImV4cCI6MjEwMDIxNjIzNX0.QA9_iwMeVgWFlx8Np-o1pzSATDKj1JHBmf7FnuzEwBw"; 

    // Initialize Supabase Client
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // 2. Connection Test (Page එක Load වෙද්දීම auto-check වෙනවා)
    (async () => {
        console.log("Testing connection to Supabase...");
        try {
            const { data, error } = await supabaseClient.from('products').select('*').limit(1);
            if (error) {
                console.error("Connection Error:", error.message);
                alert("⚠️ Supabase Connection Issue: " + error.message + "\n\n(Supabase Table Editor එකේ 'products' නමින් table එකක් තියෙනවාද සහ RLS Disable කරලාද බලන්න)");
            } else {
                console.log("Connected successfully to Supabase!");
                alert("✅ Supabase එකට සාර්ථකව සම්බන්ධ වුණා!");
            }
        } catch (err) {
            console.error("Unexpected Error:", err);
        }
    })();

    // 3. Form එකෙන් Data Insert කරන Function එක
    async function addProduct(event) {
      event.preventDefault(); // Form reload වීම නවත්වයි

      const name = document.getElementById('p_name').value;
      const price = parseFloat(document.getElementById('p_price').value);
      const qty = parseInt(document.getElementById('p_qty').value);
      
      const saveBtn = document.getElementById('save-btn');
      const statusMsg = document.getElementById('statusMsg');

      // Loading state
      saveBtn.disabled = true;
      saveBtn.innerText = "Saving Data...";
      statusMsg.classList.add('hidden');

      try {
        // Supabase 'products' table එකට Data insert කිරීම
        const { data, error } = await supabaseClient
          .from('products')
          .insert([
            { name: name, price: price, qty: qty }
          ]);

        if (error) throw error;

        // Success Response
        alert("🎉 Product එක සාර්ථකව Save වුණා!");
        showStatus("Data added successfully!", "text-green-600");
        document.getElementById('productForm').reset(); // Form එක clear කිරීම

      } catch (error) {
        // Error Handling
        console.error("Insert Error:", error);
        alert("❌ Data Save වුණේ නැහැ!\nError: " + error.message);
        showStatus("Error: " + error.message, "text-red-600");
      } finally {
        saveBtn.disabled = false;
        saveBtn.innerText = "Save to Database";
      }
    }

    // Helper Function for status text
    function showStatus(msg, textClass) {
      const statusMsg = document.getElementById('statusMsg');
      statusMsg.innerText = msg;
      statusMsg.className = `mt-4 text-center font-medium text-sm ${textClass}`;
      statusMsg.classList.remove('hidden');
    }
  </script>

</body>
</html>
