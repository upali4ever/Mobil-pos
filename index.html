<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S-Stock POS System</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <!-- HTML5 QR Code Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Top Navigation -->
    <header class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center">
        <h1 class="text-xl font-bold">🛒 S-Stock POS System</h1>
        <button onclick="syncToSupabase()" class="bg-green-500 hover:bg-green-600 px-4 py-2 rounded font-bold transition">
            🔄 Cloud Sync
        </button>
    </header>

    <div class="container mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6">

        <!-- Left Column: Products Management & Add Item -->
        <div class="md:col-span-1 space-y-6">
            <!-- Add Product Card -->
            <div class="bg-white p-4 rounded-lg shadow">
                <h2 class="text-lg font-bold mb-3 border-b pb-2">අලුත් බාණ්ඩයක් එකතු කිරීම</h2>
                <form id="productForm" class="space-y-3">
                    <input type="text" id="pCode" placeholder="Item Code / Barcode" class="w-full border p-2 rounded">
                    <input type="text" id="pName" placeholder="Item Name" required class="w-full border p-2 rounded">
                    <div class="grid grid-cols-2 gap-2">
                        <input type="number" id="pCost" placeholder="Cost Price" class="border p-2 rounded">
                        <input type="number" id="pPrice" placeholder="Selling Price" required class="border p-2 rounded">
                    </div>
                    <input type="number" id="pStock" placeholder="Stock Quantity" required class="border p-2 rounded w-full">
                    <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded font-bold hover:bg-blue-700">
                        + Save Product
                    </button>
                </form>
            </div>

            <!-- Barcode Scanner Card -->
            <div class="bg-white p-4 rounded-lg shadow">
                <h2 class="text-lg font-bold mb-3 border-b pb-2">📷 QR / Barcode Scanner</h2>
                <div id="reader" width="100%"></div>
            </div>
        </div>

        <!-- Right Column: Cart & Billing -->
        <div class="md:col-span-2 space-y-6">
            <!-- POS Billing Table -->
            <div class="bg-white p-4 rounded-lg shadow">
                <h2 class="text-lg font-bold mb-3 border-b pb-2">වත්මන් බිල්පත (Current Bill)</h2>
                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-200">
                                <th class="p-2">Item</th>
                                <th class="p-2">Price</th>
                                <th class="p-2">Qty</th>
                                <th class="p-2">Total</th>
                                <th class="p-2">Action</th>
                            </tr>
                        </thead>
                        <tbody id="cartTable">
                            <!-- Cart items render here -->
                        </tbody>
                    </table>
                </div>

                <!-- Billing Summary -->
                <div class="mt-4 border-t pt-4 space-y-2">
                    <div class="flex justify-between text-lg font-bold">
                        <span>Total:</span>
                        <span id="billTotal">Rs. 0.00</span>
                    </div>
                    <button onclick="checkout()" class="w-full bg-green-600 text-white py-3 rounded text-lg font-bold hover:bg-green-700">
                        Complete Sale & Print
                    </button>
                </div>
            </div>

            <!-- Inventory List -->
            <div class="bg-white p-4 rounded-lg shadow">
                <h2 class="text-lg font-bold mb-3 border-b pb-2">📦 Stock List</h2>
                <div class="overflow-x-auto max-h-60">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-200">
                                <th class="p-2">Name</th>
                                <th class="p-2">Price</th>
                                <th class="p-2">Stock</th>
                                <th class="p-2">Add</th>
                            </tr>
                        </thead>
                        <tbody id="stockTable">
                            <!-- Stock items render here -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </div>

    <!-- JavaScript Engine -->
    <script>
        // -------------------------------------------------------------
        // 1. SUPABASE CONFIGURATION
        // -------------------------------------------------------------
        const SUPABASE_URL = "https://vpkwgxrabixokeqppduh.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZwa3dneHJhYml4b2tlcXBwZHVoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2NDAyMzUsImV4cCI6MjEwMDIxNjIzNX0.QA9_iwMeVgWFlx8Np-o1pzSATDKj1JHBmf7FnuzEwBw"; // <--- anon key එක මෙතැනට දාන්න

        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // -------------------------------------------------------------
        // 2. LOCAL DATA STORAGE
        // -------------------------------------------------------------
        let products = JSON.parse(localStorage.getItem('pos_products')) || [];
        let sales = JSON.parse(localStorage.getItem('pos_sales')) || [];
        let credits = JSON.parse(localStorage.getItem('pos_credits')) || [];
        let cart = [];

        // Save local data helper
        function saveLocalStorage() {
            localStorage.setItem('pos_products', JSON.stringify(products));
            localStorage.setItem('pos_sales', JSON.stringify(sales));
            localStorage.setItem('pos_credits', JSON.stringify(credits));
            renderTables();
        }

        // -------------------------------------------------------------
        // 3. UI RENDERING
        // -------------------------------------------------------------
        function renderTables() {
            // Stock Table
            const stockBody = document.getElementById('stockTable');
            stockBody.innerHTML = products.map(p => `
                <tr class="border-b">
                    <td class="p-2">${p.name}</td>
                    <td class="p-2">Rs. ${p.price}</td>
                    <td class="p-2">${p.stock}</td>
                    <td class="p-2">
                        <button onclick="addToCart(${p.id})" class="bg-blue-500 text-white px-2 py-1 rounded text-sm">+ Add</button>
                    </td>
                </tr>
            `).join('');

            // Cart Table
            const cartBody = document.getElementById('cartTable');
            let total = 0;
            cartBody.innerHTML = cart.map((item, index) => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                return `
                    <tr class="border-b">
                        <td class="p-2">${item.name}</td>
                        <td class="p-2">Rs. ${item.price}</td>
                        <td class="p-2">${item.qty}</td>
                        <td class="p-2">Rs. ${itemTotal}</td>
                        <td class="p-2">
                            <button onclick="removeFromCart(${index})" class="bg-red-500 text-white px-2 py-1 rounded text-sm">X</button>
                        </td>
                    </tr>
                `;
            }).join('');

            document.getElementById('billTotal').innerText = `Rs. ${total.toFixed(2)}`;
        }

        // -------------------------------------------------------------
        // 4. POS ACTIONS
        // -------------------------------------------------------------
        document.getElementById('productForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newProduct = {
                id: Date.now(),
                code: document.getElementById('pCode').value,
                name: document.getElementById('pName').value,
                cost: Number(document.getElementById('pCost').value) || 0,
                price: Number(document.getElementById('pPrice').value) || 0,
                stock: Number(document.getElementById('pStock').value) || 0
            };
            products.push(newProduct);
            saveLocalStorage();
            e.target.reset();
        });

        function addToCart(productId) {
            const product = products.find(p => p.id === productId);
            if (!product || product.stock <= 0) {
                alert("Stock මදි හෝ භාණ්ඩය සොයාගත නොහැක!");
                return;
            }
            const cartItem = cart.find(item => item.id === productId);
            if (cartItem) {
                cartItem.qty += 1;
            } else {
                cart.push({ ...product, qty: 1 });
            }
            renderTables();
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            renderTables();
        }

        function checkout() {
            if (cart.length === 0) return alert("Cart එක හිස්ය!");

            let totalAmt = 0;
            let totalCost = 0;

            cart.forEach(item => {
                totalAmt += item.price * item.qty;
                totalCost += item.cost * item.qty;

                // Deduct stock
                const p = products.find(prod => prod.id === item.id);
                if (p) p.stock -= item.qty;
            });

            const newSale = {
                id: Date.now(),
                date: new Date().toISOString(),
                subtotal: totalAmt,
                discount: 0,
                total: totalAmt,
                profit: totalAmt - totalCost,
                method: 'Cash',
                customer: 'General',
                items: cart
            };

            sales.push(newSale);
            cart = [];
            saveLocalStorage();
            alert("ගනුදෙනුව සාර්ථකයි!");
            syncToSupabase(); // Auto sync on sale
        }

        // -------------------------------------------------------------
        // 5. CLOUD SYNC ENGINE (SUPABASE)
        // -------------------------------------------------------------
        async function syncToSupabase() {
            try {
                console.log("🔄 Starting Sync...");

                // Format Data for Postgresql compatibility
                const formattedProducts = products.map(p => ({
                    id: Number(p.id),
                    name: String(p.name || ''),
                    cost: Number(p.cost) || 0,
                    price: Number(p.price) || 0,
                    stock: Number(p.stock) || 0,
                    code: String(p.code || '')
                }));

                const formattedSales = sales.map(s => ({
                    id: Number(s.id),
                    date: String(s.date || ''),
                    subtotal: Number(s.subtotal) || 0,
                    discount: Number(s.discount) || 0,
                    total: Number(s.total) || 0,
                    profit: Number(s.profit) || 0,
                    method: String(s.method || 'Cash'),
                    customer: String(s.customer || 'General'),
                    items: Array.isArray(s.items) ? s.items : []
                }));

                // Upsert to Supabase
                if (formattedProducts.length > 0) {
                    const { error: pErr } = await supabase.from('products').upsert(formattedProducts);
                    if (pErr) console.error("Products Sync Error:", pErr);
                }

                if (formattedSales.length > 0) {
                    const { error: sErr } = await supabase.from('sales').upsert(formattedSales);
                    if (sErr) console.error("Sales Sync Error:", sErr);
                }

                alert("Cloud Sync සාර්ථකයි!");
            } catch (err) {
                console.error("Sync Exception:", err);
                alert("Sync Error! Console එක බලන්න.");
            }
        }

        // -------------------------------------------------------------
        // 6. QR / BARCODE SCANNER
        // -------------------------------------------------------------
        function onScanSuccess(decodedText) {
            const foundProduct = products.find(p => p.code === decodedText);
            if (foundProduct) {
                addToCart(foundProduct.id);
            } else {
                alert(`Scanned Code: ${decodedText} (Stock එකේ නොමැත)`);
            }
        }

        const html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: 250 });
        html5QrcodeScanner.render(onScanSuccess);

        // Initial Render
        renderTables();
    </script>
</body>
</html>
